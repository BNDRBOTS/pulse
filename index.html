<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BNDR | Zen</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;800;900&display=swap');
        
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        .overlay {
            position: absolute;
            inset: 0;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 2.5rem;
            pointer-events: none;
        }

        .center-stage {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            transition: transform 0.05s ease-out;
            will-change: transform;
        }

        .headline-top {
            font-size: clamp(4.5rem, 14vw, 12rem);
            font-weight: 900;
            line-height: 0.85;
            letter-spacing: -0.06em;
            background: linear-gradient(90deg, #ff9955 0%, #bb44ff 50%, #ffffaa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0px 0px 60px rgba(255, 153, 85, 0.6));
            margin-bottom: -0.05em;
            text-transform: uppercase;
        }

        .headline-bottom {
            font-size: clamp(4.5rem, 14vw, 12rem);
            font-weight: 900;
            line-height: 0.85;
            letter-spacing: -0.06em;
            background: linear-gradient(90deg, #00aaff 0%, #00dd66 50%, #00eeff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0px 0px 60px rgba(0, 170, 255, 0.6));
            text-transform: uppercase;
        }

        .subtitle {
            max-width: 700px;
            margin-top: 2.5rem;
            font-size: clamp(1.1rem, 2.5vw, 1.4rem);
            font-weight: 500;
            line-height: 1.6;
            color: rgba(255, 255, 255, 1);
            text-align: center;
            text-shadow: 0px 6px 25px rgba(0,0,0,1), 0px 2px 5px rgba(0,0,0,1);
        }

        .top-bar, .bottom-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-weight: 800;
            letter-spacing: 0.15em;
            font-size: 0.85rem;
            text-shadow: 0px 2px 10px rgba(0,0,0,0.8);
        }

        .brand-orb {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff9955, #bb44ff);
            box-shadow: 0 0 20px rgba(187, 68, 255, 0.9);
        }

        .play-trigger {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }

        .play-trigger:hover {
            border-color: #00aaff;
            box-shadow: 0 0 50px rgba(0, 170, 255, 0.9), inset 0 0 25px rgba(0, 170, 255, 0.5);
            transform: scale(1.15);
        }

        .play-glyph {
            width: 0;
            height: 0;
            border-top: 9px solid transparent;
            border-left: 15px solid white;
            border-bottom: 9px solid transparent;
            margin-left: 5px;
            transition: border-left-color 0.2s ease;
        }

        .play-trigger:hover .play-glyph {
            border-left-color: #00aaff;
        }

        .hud-text {
            font-size: 0.8rem;
            font-weight: 800;
            letter-spacing: 0.3em;
        }

        .hud-left { color: #00aaff; text-shadow: 0 0 15px rgba(0, 170, 255, 0.7); }
        .hud-right { color: rgba(255, 255, 255, 0.6); }

        @media (max-width: 768px) {
            .overlay { padding: 1.5rem; }
            .play-trigger { width: 54px; height: 54px; }
            .play-glyph { border-top: 7px solid transparent; border-left: 12px solid white; border-bottom: 7px solid transparent; }
        }
    </style>
</head>
<body>
    <canvas id="renderView"></canvas>
    
    <div class="overlay">
        <div class="top-bar">
            <div class="brand">
                <div class="brand-orb"></div>
                BNDR
            </div>
            <div class="play-trigger" id="audioBtn">
                <div class="play-glyph"></div>
            </div>
        </div>
        
        <div class="center-stage" id="stage">
            <div class="headline-top">YOU BELONG</div>
            <div class="headline-bottom">HERE.</div>
            <div class="subtitle">
               See yourself in every color and rhythm - we all deserve to just 'be', without explaining ourselves.
            </div>
        </div>

        <div class="bottom-bar">
            <div class="hud-text hud-left">01 &mdash; RESONANCE</div>
            <div class="hud-text hud-right">VISUALIZER ACTIVE</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('renderView');
        const ctx = canvas.getContext('2d', { alpha: false });
        const textLayer = document.getElementById('stage');
        const dpr = window['device' + 'Pixel' + 'Ratio'] || 1;
        
        let width, height, cx, cy;
        let elements = [];
        let audioCtx = null;
        let isStreaming = false;
        let shockwaveForce = 0;
        let tick = 0;
        let pointer = { x: -2000, y: -2000, active: false };
        let parallaxTarget = { x: 0, y: 0 };
        let parallaxCurrent = { x: 0, y: 0 };
        let oscillators = [];

        // Hyper-vibrant blended palette: Creame orange, violet glows, pale yellow, bright blues integrating into greens and beyond
        const palette = ['#ff9955', '#bb44ff', '#ffffaa', '#00ffaa', '#00aaff', '#00dd66', '#00eeff'];
        const PI2 = Math.PI * 2;

        function adaptScreen() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width * dpr;
            canvas.height = height * dpr;
            ctx.scale(dpr, dpr);
            cx = width / 2;
            cy = height / 2;
        }
        
        window.addEventListener('resize', adaptScreen);
        adaptScreen();

        window.addEventListener('mousemove', e => {
            pointer.x = e.clientX;
            pointer.y = e.clientY;
            pointer.active = true;
        });
        
        window.addEventListener('touchmove', e => {
            pointer.x = e.touches[0].clientX;
            pointer.y = e.touches[0].clientY;
            pointer.active = true;
        }, { passive: true });
        
        window.addEventListener('touchend', () => pointer.active = false);
        window.addEventListener('mouseleave', () => pointer.active = false);

        function boot() {
            // Increased density and finer base scale for an intricate, "elite" level of detail
            const density = window.innerWidth < 768 ? 4500 : 12000;
            const goldenAngle = 137.508 * (Math.PI / 180);
            
            elements = [];
            for (let i = 0; i < density; i++) {
                let r = Math.sqrt(i) * (window.innerWidth < 768 ? 3.5 : 5.5);
                let a = i * goldenAngle;
                let colorHex = palette[i % palette.length];
                
                elements.push({
                    baseR: r,
                    r: r,
                    a: a,
                    color: colorHex,
                    // Smaller initial particle size allows for elegant structural webbing
                    size: (Math.random() * 1.5) + 0.5 
                });
            }
        }

        function fireCinematicDrop() {
            if (!audioCtx) {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                audioCtx = new AudioContext();
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();

            // Retain visual impact
            shockwaveForce = 6.5; 

            if (oscillators.length === 0) {
                const masterGain = audioCtx.createGain();
                masterGain.gain.value = 0.4;
                
                const filter = audioCtx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 1000;
                
                const delay = audioCtx.createDelay(2.0);
                delay.delayTime.value = 0.75;
                const feedback = audioCtx.createGain();
                feedback.gain.value = 0.6;
                delay.connect(feedback);
                feedback.connect(delay);
                
                filter.connect(masterGain);
                filter.connect(delay);
                delay.connect(masterGain);
                masterGain.connect(audioCtx.destination);
                
                const lfo = audioCtx.createOscillator();
                lfo.type = 'sine';
                lfo.frequency.value = 0.02; 
                const lfoGain = audioCtx.createGain();
                lfoGain.gain.value = 400;
                lfo.connect(lfoGain);
                lfoGain.connect(filter.frequency);
                lfo.start();

                const baseScale = [128.00, 160.00, 192.00, 256.00, 320.00, 384.00];
                
                for (let i = 0; i < 5; i++) {
                    let osc = audioCtx.createOscillator();
                    osc.type = i % 2 === 0 ? 'sine' : 'triangle';
                    
                    let oscGain = audioCtx.createGain();
                    oscGain.gain.value = 0; 
                    oscGain.gain.linearRampToValueAtTime(0.2, audioCtx.currentTime + 4);
                    
                    osc.connect(oscGain);
                    oscGain.connect(filter);
                    
                    let freq = baseScale[i % baseScale.length];
                    osc.frequency.value = freq;
                    osc.start();
                    
                    oscillators.push({osc: osc, gain: oscGain, targetFreq: freq});
                }
            }
        }

        document.getElementById('audioBtn').addEventListener('click', () => {
            if (!audioCtx) {
                fireCinematicDrop();
                isStreaming = true;
                setInterval(() => {
                    if (audioCtx && isStreaming) {
                        const now = audioCtx.currentTime;
                        // Elite harmonic progressions: Strict beautiful chords guarantee it stays perfectly in tune
                        const chords = [
                            [128.00, 160.00, 192.00, 256.00, 320.00], // C Maj 9
                            [170.66, 213.33, 256.00, 320.00, 384.00], // F Maj 9
                            [144.00, 172.80, 216.00, 259.20, 345.60], // D Min 11
                            [160.00, 192.00, 240.00, 288.00, 384.00]  // E Min 7
                        ];
                        
                        window.chordIdx = (window.chordIdx !== undefined ? window.chordIdx + 1 : 1) % chords.length;
                        let nextChord = chords[window.chordIdx];
                        
                        oscillators.forEach((o, i) => {
                            let nextFreq = nextChord[i % nextChord.length];
                            o.targetFreq = nextFreq;
                            
                            // Exponential ramp ensures perfect pitch perception, and strict uniform timing 
                            // prevents out-of-tune microtones during the transition.
                            o.osc.frequency.exponentialRampToValueAtTime(nextFreq, now + 3.0);
                        });
                        
                        shockwaveForce = 3 + Math.random() * 2;
                    }
                }, 4000); 
            } else {
                if (isStreaming) {
                    audioCtx.suspend();
                    isStreaming = false;
                } else {
                    audioCtx.resume();
                    isStreaming = true;
                    shockwaveForce = 6.5;
                }
            }
        });

        function run() {
            if (pointer.active) {
                parallaxTarget.x = (pointer.x - cx) * 0.015;
                parallaxTarget.y = (pointer.y - cy) * 0.015;
            } else {
                parallaxTarget.x = 0;
                parallaxTarget.y = 0;
            }
            parallaxCurrent.x += (parallaxTarget.x - parallaxCurrent.x) * 0.1;
            parallaxCurrent.y += (parallaxTarget.y - parallaxCurrent.y) * 0.1;

            // Clear frame with gentle trail mapping
            ctx.globalCompositeOperation = 'source-over';
            ctx.globalAlpha = 1.0;
            ctx.fillStyle = 'rgba(0, 0, 0, 0.15)'; 
            ctx.fillRect(0, 0, width, height);
            
            // Screen blending maximizes vibrant color overlap without blowing out to pure white as fast as lighter
            ctx.globalCompositeOperation = 'screen';
            tick += 0.025; 
            shockwaveForce *= 0.90; 
            
            textLayer.style.transform = `scale(${1 + (shockwaveForce * 0.08)})`;

            let depthRef = Math.max(width, 800) / 2;

            for (let i = 0; i < elements.length; i++) {
                let p = elements[i];
                
                p.a -= 0.005 + (0.004 * (p.baseR / 200));
                
                // Elite artifact detailing: Complex multi-harmonic orbital interference
                let wave1 = Math.sin(p.a * 15 - tick * 12) * (50 * shockwaveForce);
                let wave2 = Math.cos(p.a * 7 + tick * 8) * (25 * shockwaveForce);
                let wave3 = Math.sin(p.r * 0.08 - tick * 15) * (15 * shockwaveForce);
                
                p.r = p.baseR + wave1 + wave2 + wave3 + (shockwaveForce * 40); 
                
                let x = cx + Math.cos(p.a) * p.r;
                let y = cy + Math.sin(p.a) * p.r;
                
                let distToCenter = Math.sqrt((x - cx) ** 2 + (y - cy) ** 2);
                
                // Keep the smooth, deep 3D curve
                let zScale = 0.05 + Math.pow(distToCenter / depthRef, 2.2) * 5.5;
                
                x -= parallaxCurrent.x * zScale * 2.5; 
                y -= parallaxCurrent.y * zScale * 2.5;

                let renderColor = p.color;
                
                // Hard cap size & alpha so edges blend gracefully.
                // INCREASED minimum size and alpha to eliminate the dark center shadow,
                // revealing the colorful twirling depth at the absolute core.
                let maxParticleSize = window.innerWidth < 768 ? 8 : 14;
                let renderSize = Math.max(1.5, Math.min(p.size * (zScale + 1.2), maxParticleSize));
                
                // Solid minimum alpha guarantees the center is vivid and present
                let alpha = Math.min(0.9, Math.max(0.25, zScale * 0.25)); 
                
                if (pointer.active) {
                    let dx = x - pointer.x;
                    let dy = y - pointer.y;
                    let distSq = dx * dx + dy * dy;
                    
                    if (distSq < 62500) { 
                        let dist = Math.sqrt(distSq);
                        let push = (250 - dist) / 250;
                        x += (dx / dist) * push * 180;
                        y += (dy / dist) * push * 180;
                        // Instead of turning white, amplify the particle's natural brilliant color
                        renderSize = Math.min(renderSize * 2.5, 20); 
                        alpha = Math.min(1.0, alpha * 2.5);
                    }
                }
                
                ctx.globalAlpha = alpha;
                ctx.fillStyle = renderColor;
                ctx.beginPath();
                ctx.arc(x, y, renderSize, 0, PI2);
                ctx.fill();
            }
            
            requestAnimationFrame(run);
        }

        boot();
        run();
    </script>
</body>
</html>
